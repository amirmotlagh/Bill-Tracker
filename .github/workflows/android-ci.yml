name: Android CI - Build APKs

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect repo root
        run: |
          echo "PWD=$(pwd)"
          ls -la
          find . -maxdepth 2 -type f | sort | head -300

      - name: Validate Gradle wrapper files
        run: |
          missing=0
          [ -f "./gradlew" ] || { echo "Missing ./gradlew"; missing=1; }
          [ -f "./gradlew.bat" ] || { echo "Missing ./gradlew.bat"; missing=1; }
          [ -f "./gradle/wrapper/gradle-wrapper.properties" ] || { echo "Missing gradle/wrapper/gradle-wrapper.properties"; missing=1; }
          [ -f "./gradle/wrapper/gradle-wrapper.jar" ] || { echo "Missing gradle/wrapper/gradle-wrapper.jar"; missing=1; }
          [ "$missing" -eq 0 ] || exit 1

      - name: Ensure gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew --no-daemon assembleDebug -x kspDebugKotlin

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Build Release APK if signing secrets exist
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Release signing secrets not set. Skipping release build."
            exit 0
          fi

          echo "$KEYSTORE_BASE64" | base64 --decode > my-release-key.jks

          export KEYSTORE_PATH="$GITHUB_WORKSPACE/my-release-key.jks"
          export STORE_PASSWORD="$KEYSTORE_PASSWORD"
          export KEY_PASSWORD="$KEY_PASSWORD"

          ./gradlew --no-daemon assembleRelease -x kspReleaseKotlin

      - name: Upload Release APK (if built)
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: ignore