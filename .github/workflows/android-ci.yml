name: Android CI - Build APKs

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect repo root
        run: |
          echo "PWD=$(pwd)"
          ls -la
          echo "Top-level files:"
          find . -maxdepth 2 -type f | sort

      - name: Validate Gradle wrapper files
        run: |
          missing=0
          [ -f "./gradlew" ] || { echo "Missing ./gradlew"; missing=1; }
          [ -f "./gradlew.bat" ] || { echo "Missing ./gradlew.bat"; missing=1; }
          [ -f "./gradle/wrapper/gradle-wrapper.properties" ] || { echo "Missing gradle/wrapper/gradle-wrapper.properties"; missing=1; }
          [ -f "./gradle/wrapper/gradle-wrapper.jar" ] || { echo "Missing gradle/wrapper/gradle-wrapper.jar"; missing=1; }

          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "Gradle wrapper is missing. Add wrapper files to repo:"
            echo "  gradlew"
            echo "  gradlew.bat"
            echo "  gradle/wrapper/gradle-wrapper.properties"
            echo "  gradle/wrapper/gradle-wrapper.jar"
            exit 1
          fi

      - name: Ensure gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-release-key.jks

      - name: Build Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-release-key.jks
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error